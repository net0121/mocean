<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>mocean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- CSS handles the depth-gradient water color; Pixi's canvas sits on top, transparent -->
  <div id="water-bg"></div>
  <div id="pixi-root"></div>

  <div id="hud">
    <div class="label">Depth</div>
    <div class="value"><span id="depthVal">0</span> m</div>
  </div>

  <div id="depthbar"><div id="depthdot"></div></div>

  <div id="creature-tooltip"></div>

  <div id="instructions">Arrow keys to swim &nbsp;•&nbsp; hold a direction to accelerate &nbsp;•&nbsp; breach to flip or press Space &nbsp;•&nbsp; Tab for debug</div>

  <div id="touch-controls">
    <button id="btn-up">&#9650;</button>
    <button id="btn-left">&#9664;</button>
    <button id="btn-down">&#9660;</button>
    <button id="btn-right">&#9654;</button>
  </div>

  <!-- PixiJS v7 (rendering engine: scene graph, camera transforms, Graphics/line drawing) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.x/dist/pixi.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
