<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>mocean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="water-bg"></div>
  <div id="pixi-root"></div>

  <!-- Title Screen -->
  <div id="title-screen" class="screen-active">
    <div class="title-content">
      <h1 id="title-text" class="watery-title" data-text="mocean">mocean</h1>
      <p class="tagline">Dive into the endless blue</p>
      <button id="play-button" class="play-btn">Play</button>
      <button id="options-button" class="options-btn">Options</button>
      <div class="version">v1.2.0</div>
    </div>
  </div>

  <!-- Options Menu -->
  <div id="options-screen" class="screen-hidden">
    <div class="options-content">
      <h2>Options</h2>
      <div class="option-group">
        <label for="volume-slider">Master Volume</label>
        <input type="range" id="volume-slider" min="0" max="100" value="100">
      </div>
      <div class="option-group">
        <label for="brightness-slider">Brightness</label>
        <input type="range" id="brightness-slider" min="50" max="150" value="100">
      </div>
      <div class="option-group">
        <label for="difficulty-select">Difficulty</label>
        <select id="difficulty-select">
          <option value="peaceful">Peaceful</option>
          <option value="normal">Normal</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div class="option-group">
        <label>
          <input type="checkbox" id="show-hints-checkbox" checked>
          Show Controls Hint
        </label>
      </div>
      <button id="back-button" class="back-btn">Back</button>
    </div>
  </div>

  <div id="hud">
    <div class="label">Depth</div>
    <div class="value"><span id="depthVal">0</span> m</div>
    <div id="daynight-clock"></div>
  </div>

  <div id="creature-tooltip"></div>

  <div id="instructions">Arrow keys to swim &nbsp;&bull;&nbsp; hold a direction to accelerate &nbsp;&bull;&nbsp; breach to flip or press Space &nbsp;&bull;&nbsp; Tab for debug &nbsp;&bull;&nbsp; / for commands</div>

  <div id="touch-controls">
    <div class="touch-area" id="touch-area"></div>
    <div class="touch-hint">Drag anywhere to swim</div>
  </div>

  <div id="command-prompt" class="command-hidden">
    <div class="command-container">
      <div class="command-output" id="command-output"></div>
      <input type="text" id="command-input" placeholder="Enter command..." autocomplete="off" spellcheck="false">
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.x/dist/pixi.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
